name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true

jobs:
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'DEPLOY' }}
        run: |
          echo "Confirmation failed. Type DEPLOY to confirm."
          exit 1

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build backend
        run: ./gradlew shadowJar --no-daemon

      - name: Run backend tests
        run: ./gradlew test --no-daemon

  deploy:
    name: Deploy to Railway Production
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Trigger Railway production deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { serviceInstanceRedeploy(environmentId: \\\"${{ secrets.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}\\\", serviceId: \\\"${{ secrets.RAILWAY_PRODUCTION_SERVICE_ID }}\\\") }\"}" \
            https://backboard.railway.app/graphql/v2

      - name: Notify success
        run: echo "Production deploy triggered successfully"